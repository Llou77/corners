name: Corner Prophet - Napi Futtatások

on:
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC = 06:00 Budapest — Eredmény ellenőrzés
    - cron: '0 8 * * *'   # 08:00 UTC = 10:00 Budapest — Napi becslés + Telegram
  workflow_dispatch:
    inputs:
      job:
        description: 'Melyik job fusson? (check / predict / both)'
        default: 'both'

permissions:
  contents: write

jobs:
  check-results:
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 4 * * *') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'check' || github.event.inputs.job == 'both'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Eredmény ellenőrzés
        env:
          FDORG_TOKEN: ${{ secrets.FDORG_TOKEN }}
        run: python3 check_results.py
      - name: Commit eredmények
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p predictions
          git add predictions/ || true
          git diff --staged --quiet && echo "Nincs változás." || (
            git commit -m "Eredmények frissítve: $(date '+%Y-%m-%d')" && git push
          )

  daily-predict:
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 8 * * *') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'predict' || github.event.inputs.job == 'both'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Napi becslés futtatása
        env:
          FDORG_TOKEN: ${{ secrets.FDORG_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 daily_report.py
      - name: Commit becslések
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p predictions
          git add predictions/ || true
          git diff --staged --quiet && echo "Nincs változás." || (
            git commit -m "Becslések mentve: $(date '+%Y-%m-%d')" && git push
          )
