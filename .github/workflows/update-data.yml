name: CSV adatok frissítése

on:
  schedule:
    - cron: '0 5 * * 2,5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-csv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Szezon detektálás (minden liga)
        run: python3 season_detector.py

      - name: CSV-k letöltése (season_config alapján)
        run: |
          python3 - << 'PYEOF'
          import json, urllib.request, os, glob

          os.makedirs('data', exist_ok=True)

          # Összes liga konfig betöltése
          configs = glob.glob('data/season_config_*.json')
          if not configs:
              configs = ['data/season_config.json']

          for config_path in configs:
              try:
                  with open(config_path) as f:
                      cfg = json.load(f)
                  league = cfg.get('league', 'E0')
                  for s in cfg.get('seasons', []):
                      url = f"https://www.football-data.co.uk/mmz4281/{s['code']}/{league}.csv"
                      dest = s['file']
                      print(f"Letöltés: {s['label']} {league} -> {dest}")
                      try:
                          req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                          with urllib.request.urlopen(req, timeout=15) as r:
                              with open(dest, 'wb') as out:
                                  out.write(r.read())
                          print(f"  OK: {os.path.getsize(dest)} byte")
                      except Exception as e:
                          print(f"  HIBA: {e}")
              except Exception as e:
                  print(f"Konfig hiba ({config_path}): {e}")
          PYEOF

      - name: Commit és push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && echo "Nincs változás." || (
            git commit -m "CSV + szezon konfig frissítés: $(date '+%Y-%m-%d')" &&
            git push
          )
